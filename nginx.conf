# Nginx Reverse Proxy — WA Gateway
# File: /etc/nginx/sites-available/wa-gateway
#
# Cara install:
#   sudo ln -s /etc/nginx/sites-available/wa-gateway /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d api.domain-kamu.com
#   sudo nginx -t && sudo systemctl reload nginx

server {
    server_name api.domain-kamu.com;  # Ganti dengan domain API kamu

    location / {
        proxy_pass http://127.0.0.1:3001;

        # ── WebSocket Upgrade (wajib untuk WSS) ─────────────────────
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # ── Standard Proxy Headers ───────────────────────────────────
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── Timeout ───────────────────────────────────────────────────
        # Hermes axios timeout = 300s (5 menit). Tambahkan buffer 2x → 600s.
        # WebSocket long-poll tetap terlindungi oleh proxy_read_timeout ini.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;

        # ── Buffer settings ──────────────────────────────────────────
        proxy_buffering off;
    }

    # SSL akan ditambahkan otomatis oleh Certbot di bawah ini
    listen 80;
}
