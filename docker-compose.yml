services:
  # ── PostgreSQL Database ──────────────────────────────────────────────────
  postgres-db:
    image: postgres:15-alpine
    container_name: wagateway-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-wagateway}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      # $$ agar Docker Compose tidak menginterpolasi variable dari .env host
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-admin} -d $${POSTGRES_DB:-wagateway}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Hermes Agent ─────────────────────────────────────────────────────────
  # Diletakkan sebelum wa-gateway agar depends_on bisa mereferensikannya
  hermes-agent:
    image: nikolaik/python-nodejs:python3.11-nodejs20
    container_name: wagateway-hermes
    ports:
      - "127.0.0.1:8642:8642"
    volumes:
      - hermes_sessions:/root/.hermes/sessions    # Global session tanpa profil spesifik
      - ./config.yaml:/root/.hermes/config.yaml:ro
    entrypoint: >
      bash -c "
        pip install --no-cache-dir hermes-agent &&
        hermes gateway run --replace
      "
    restart: unless-stopped

  # ── WA Gateway (Node.js + Chromium) ─────────────────────────────────────
  wa-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wagateway-app
    ports:
      - "127.0.0.1:3001:3001"
    # shm_size DIHAPUS: Chromium dikonfigurasi dengan --disable-dev-shm-usage
    # sehingga Chromium menggunakan /tmp (bukan /dev/shm) — shm_size tidak berpengaruh.
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-changeme}@postgres-db:5432/${POSTGRES_DB:-wagateway}?schema=public"
      HERMES_API_URL: ${HERMES_API_URL}
      HERMES_API_KEY: ${HERMES_API_KEY}
      HERMES_SECRET: ${HERMES_SECRET}
      EXPRESS_PORT: 3001
      JWT_SECRET: ${JWT_SECRET}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-http://localhost:3000}
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    depends_on:
      postgres-db:
        condition: service_healthy
      hermes-agent:
        condition: service_started  # Hermes tidak punya healthcheck; minimal pastikan container jalan
    volumes:
      - wa_auth:/app/.wwebjs_auth
      - wa_cache:/app/.wwebjs_cache
    restart: unless-stopped
    healthcheck:
      # Gunakan endpoint /health yang sudah ada di Express app
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s  # Beri waktu Chromium + WA Client untuk warmup
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M

volumes:
  pgdata:
    name: wagateway-pgdata
  wa_auth:
    name: wagateway-wa-auth
  wa_cache:
    name: wagateway-wa-cache
  hermes_sessions:
    name: wagateway-hermes-sessions
